name: tag4u
description: Preference Graph Agent OS for group planning — tag everything, reason with AI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Persistent Graph Storage
  drift: ^2.18.0
  drift_flutter: ^0.2.1

  # Cloud Sync / Auth
  supabase_flutter: ^2.5.6

  # Utilities
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  collection: ^1.18.0

  # Serialization
  json_annotation: ^4.9.0

  # DI
  get_it: ^7.7.0
  injectable: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  injectable_generator: ^2.4.2

flutter:
  uses-material-design: true
